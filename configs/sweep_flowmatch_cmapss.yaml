program: train_generator.py
method: bayes
metric:
  name: evaluation/ftsd
  goal: minimize
command:
  - ${env}
  - python
  - ${program}
  - --track
  - engine_rul
  - --dataset
  - CMAPSS
  - --model
  - FlowMatch
  - --use_wandb
  - --config
  - configs/default_config.yaml
  - --lr
  - ${lr}
  - --batch_size
  - ${batch_size}
  - --epochs
  - ${epochs}
  - --euler_steps
  - ${euler_steps}
  - --mamba_d_model
  - ${mamba_d_model}
  - --mamba_d_state
  - ${mamba_d_state}
  - --tccm_lambda
  - ${tccm_lambda}
  - --lap_threshold
  - ${lap_threshold}
parameters:
  lr:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.001
  batch_size:
    values: [32, 64, 128]
  epochs:
    distribution: int_uniform
    min: 50
    max: 200
  euler_steps:
    distribution: int_uniform
    min: 10
    max: 100
  mamba_d_model:
    values: [64, 128, 256]
  mamba_d_state:
    values: [16, 32, 64]
  tccm_lambda:
    distribution: log_uniform_values
    min: 0.01
    max: 1.0
  lap_threshold:
    distribution: uniform
    min: 0.1
    max: 0.9
