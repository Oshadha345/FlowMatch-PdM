# configs/default_config.yaml
project_name: "FlowMatch-PdM"
seed: 42

logging:
  use_wandb: false

# Global Training Parameters
trainer:
  accelerator: "gpu"
  devices: 1
  precision:
    rul: 32
    generator: 32
  patience: 30
  classifier_patience: 5
  classifier_min_delta: 0.5
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"

# Dataset Specific Parameters
datasets:
  minority_rul_ratio: 0.2

  FEMTO:
    track: "bearing_rul"
    window_size: 2560
    batch_size: 64
    generator_batch_size: 32
    classifier_target_rmse: 225.0
    max_rul: 1500
    # Use FD ids to preserve the reader's canonical dev/val/test split.
    conditions: [1, 2, 3]
    append_condition_features: true
    split_strategy: "predefined"

  XJTU-SY:
    track: "bearing_rul"
    window_size: 2048
    batch_size: 64
    generator_batch_size: 32
    classifier_target_rmse: 75.0
    max_rul: 1200
    conditions: [1, 2, 3]
    split_strategy: "predefined"

classifier:
  mamba:
    d_model: 64
    d_state: 16
    d_conv: 4
    expand: 2
    lr: 0.0003
    epochs: 20
  lstm:
    hidden_dim: 100
    num_layers: 2
    dropout: 0.5
    lr: 0.001
    epochs: 20
  cnn1d:
    dropout: 0.3
    lr: 0.001
    epochs: 20
  transformer:
    patch_size: 32
    d_model: 64
    nhead: 4
    num_layers: 2
    dropout: 0.3
    lr: 0.0005
    epochs: 20

generative:
  diffusion:
    timesteps: 200
    lr: 0.0002
    epochs: 200
    batch_size: 128
    base_channels: 64
    num_heads: 4

  timeflow:
    hidden_dim: 64
    euler_steps: 100
    lr: 0.001
    epochs: 200
    batch_size: 128

  flowmatch_pdm:
    patch_size: 32
    mamba_d_model: 128
    mamba_d_state: 16
    d_conv: 4
    expand: 2
    num_mamba_layers: 3
    euler_steps: 200
    lr: 0.001
    epochs: 200
    batch_size: 128
    field_clamp: 10.0
    spectral_lambda: 0.1
    lap_threshold: 0.05
    tccm_lambda: 0.1
    use_harmonic_prior: true
    use_tccm: true

  cotgan:
    hidden_dim: 128
    noise_dim: 32
    lr: 0.0002
    epochs: 200
    batch_size: 64
    sinkhorn_eps: 0.1
    sinkhorn_iters: 30
    martingale_weight: 10.0
    causal_weight: 1.0
    critic_projection_dim: 32

  faultdiffusion:
    timesteps: 200
    lr: 0.0002
    epochs: 200
    batch_size: 64
    base_channels: 96
    num_heads: 4
    diversity_weight: 0.05

evaluation:
  batch_size: 128
  max_samples: 2048
  euler_steps: 200
  mmd_kernel_bandwidth: "median"
  discriminative_hidden_dim: 64
  discriminative_epochs: 20
  predictive_epochs: 20
  tstr_epochs: 20

classical:
  smote:
    k_neighbors: 5
  jittering:
    sigma: 0.05
