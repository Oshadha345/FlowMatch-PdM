# configs/default_config.yaml
project_name: "FlowMatch-PdM"
seed: 42

logging:
  use_wandb: false

# Global Training Parameters
trainer:
  accelerator: "gpu"
  devices: "auto"
  precision:
    classifier: "16-mixed"
    regressor: 32
    generator: "16-mixed"
  patience: 10

# Dataset Specific Parameters
datasets:
  minority_rul_ratio: 0.2

  CMAPSS:
    track: "engine_rul"
    window_size: 30
    max_rul: 125
    fd_list: [1, 2, 3, 4]
    split_strategy: "predefined"
    clipping: "mandatory"

  N-CMAPSS:
    track: "engine_rul"
    window_size: 50
    fd_list: [1]
    split_strategy: "predefined"

  FEMTO:
    track: "bearing_rul"
    window_size: 2560
    fd_list: [1, 2, 3]
    split_strategy: "predefined"

  XJTU-SY:
    track: "bearing_rul"
    window_size: 2048
    fd_list: [1, 2, 3]
    split_strategy: "predefined"

  CWRU:
    track: "bearing_fault"
    window_size: 2048
    stride: 512
    num_classes: 10
    split_strategy: "stratified_80_10_10"

  Paderborn:
    track: "bearing_fault"
    window_size: 4096
    stride: 2048
    num_classes: 31
    split_strategy: "stratified_80_10_10"

  DEMADICS:
    track: "bearing_fault"
    window_size: 2048
    num_classes: 5
    split_strategy: "stratified_80_10_10"

# ==========================================
# Classifier Baselines (SOTA 2024-2025)
# ==========================================
classifier:
  # Ref: Chen et al. arXiv:2410.03134
  lstm:
    hidden_dim: 100
    num_layers: 2
    dropout: 0.5
    lr: 0.001
    batch_size: 64
    epochs: 500
  
  # Ref: Vashishtha et al. arXiv:2502.08689
  cnn1d:
    filters: [16, 64, 128, 256, 256]
    kernel_sizes: [3, 3, 3, 3, 3]
    dropout: 0.3
    lr: 0.001
    batch_size: 64
    epochs: 500

# ==========================================
# Generative Baselines
# ==========================================
generative:
  # Ref: TSGM framework arXiv:2305.11567
  timevae:
    latent_dim: 16
    hidden_dim: 64
    lr: 1e-3
    epochs: 500
    batch_size: 128
  
  # Ref: Ren et al. AIGC survey arXiv:2407.11480
  timegan:
    hidden_dim: 24
    noise_dim: 32
    lr: 1e-4
    epochs: 500
    batch_size: 128
  
  # Ref: Diff-MTS + survey arXiv:2407.11501
  diffusion:
    timesteps: 200
    lr: 2e-4
    epochs: 200
    batch_size: 128
    base_channels: 64
    num_heads: 4
  
  # Ref: TimeFlow (Towards Stochastic-Aware and Efficient TS Gen)
  timeflow:
    hidden_dim: 64
    euler_steps: 100
    lr: 1e-3
    epochs: 200
    batch_size: 128
  
  # FlowMatch-PdM Parameters
  flowmatch_pdm:
    mamba_d_model: 128
    mamba_d_state: 16
    euler_steps: 100
    lr: 1e-3
    epochs: 200
    batch_size: 128
    lap_threshold: 0.05
    tccm_lambda: 10.0

  cotgan:
    hidden_dim: 128
    noise_dim: 32
    lr: 2e-4
    epochs: 200
    batch_size: 64
    sinkhorn_eps: 0.1
    sinkhorn_iters: 30
    martingale_weight: 10.0
    causal_weight: 1.0
    critic_projection_dim: 32

  faultdiffusion:
    timesteps: 200
    lr: 2e-4
    epochs: 200
    batch_size: 64
    base_channels: 96
    num_heads: 4
    diversity_weight: 0.05

evaluation:
  batch_size: 128
  max_samples: 2048
  discriminative_epochs: 20
  predictive_epochs: 20

# ==========================================
# Classical Baselines
# ==========================================
classical:
  smote:
    k_neighbors: 5
  jittering:
    sigma: 0.05
