# FlowMatch-PdM Conda Environment
# Create:  conda env create -f environment.yml
# Activate: conda activate flowmatch_pdm
#
# IMPORTANT: After creating, follow the STAGED installation in requirements.txt
# for mamba-ssm, causal-conv1d, rul-datasets, and tsaug which need special
# install flags (--no-build-isolation / --no-deps).

name: flowmatch_pdm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch with CUDA (Ampere-class GPUs)
  - pytorch=2.2.1
  - torchvision=0.17.1
  - torchaudio=2.2.1
  - pytorch-cuda=12.1

  # Core scientific stack
  - numpy=1.26.4
  - pandas=2.2.1
  - scipy=1.12.0
  - scikit-learn=1.4.1

  # Visualization
  - matplotlib=3.8.3
  - seaborn=0.13.2

  # Utilities
  - pyyaml
  - tqdm
  - h5py=3.10.0

  # Jupyter
  - jupyterlab=4.1.5

  # Build tools for mamba-ssm compilation
  - packaging
  - wheel
  - ninja

  - pip:
    # Lightning + logging
    - pytorch-lightning==2.2.1
    - wandb==0.16.4
    - tensorboard==2.16.2
    - "setuptools<81"

    # HuggingFace (pinned to avoid PyTorch conflicts)
    - transformers==4.39.3
    - accelerate==0.28.0
    - huggingface_hub==0.22.2

    # State-space backbone (install with --no-build-isolation after env creation)
    # - causal-conv1d==1.2.0.post2
    # - mamba-ssm==1.2.0.post1

    # Generative solvers
    - torchdiffeq==0.2.3
    - einops

    # Dataset libraries (install with --no-deps after env creation)
    # - rul-datasets==0.3.0
    # - tsaug==0.2.1

    # Data augmentation & imbalanced learning
    - imbalanced-learn==0.12.0
    - patool==2.2.0

    # Profiling
    - pyinstrument==4.6.2
    - psutil==5.9.8
